<!DOCTYPE html>
<html>
  <head>
    <title>ethanOS | Cozy Workspace</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  
  <body style="
    background-image: linear-gradient(rgba(46, 74, 63, 0.15), rgba(46, 74, 63, 0.15)), url('https://images.unsplash.com/photo-1511497584788-876760111969?w=1200');
    background-size: cover;
    background-position: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    font-family: 'Quicksand', sans-serif;
    color: #f4f6f4;
    transition: background-image 1s ease-in-out; /* Smoothly crossfade backgrounds! */
  ">

    <!-- 1. THE TOP BAR -->
    <div id="topBar" style="
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background-color: rgba(34, 49, 43, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 1000;
    ">
      <span id="openWelcomeBtn" style="font-family: 'Lora', serif; font-weight: 700; font-style: italic; color: #d4e3d4; font-size: 1.1rem; cursor: pointer; user-select: none;">ethanOS</span>
      <span id="themeBadge" style="font-size: 0.85rem; letter-spacing: 1px; color: #a3b899; font-weight: 600; user-select: none; cursor: pointer;" title="Click to change scenery">🍃 CYCLING SCENERY</span>
      <span id="timeElement" style="font-weight: 700; color: #f4f6f4; user-select: none;">Loading...</span>
    </div>

    <!-- 2. DESKTOP SHORTCUTS BAR -->
    <div class="desktop-apps">
      <!-- Shortcut to launch welcome screen -->
      <div id="openWelcomeBtn" class="app-icon">
        <div class="app-icon-symbol">🐱</div>
        <div class="app-icon-label">Bongo Log</div>
      </div>
      
      <!-- Shortcut to launch forest task planner -->
      <div id="openPlannerBtn" class="app-icon">
        <div class="app-icon-symbol">🌿</div>
        <div class="app-icon-label">Tasks</div>
      </div>
    </div>

    <!-- 3. WINDOW 1: WELCOME WINDOW -->
    <div id="welcomeWindow" class="window" style="top: 45%; left: 35%; transform: translate(-50%, -50%);">
      <div id="welcomeWindowHeader" class="windowheader">
        <button id="closeWelcomeBtn" class="closebutton"></button>
        <span style="font-family: 'Lora', serif; font-weight: 600; font-size: 0.9rem; color: #a3b899;">system_info.sh</span>
        <span style="width: 14px;"></span>
      </div>

      <img style="width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 3px solid #a3b899; margin-bottom: 15px;" src="./BongoCat.jpg" alt="Bongo Cat" />
      <h1 style="font-family: 'Lora', serif; margin: 0 0 12px 0; font-size: 1.6rem; color: #e1ebd5;">@DurpyBongo</h1>
      <p style="font-size: 0.85rem; line-height: 1.6; color: #c9d3c4; margin-bottom: 25px;">
        Welcome to my custom nature dashboard. Launch apps using the icons on the left.
      </p>
      <a style="display: inline-block; background-color: #a3b899; color: #1e2d24; padding: 10px 24px; text-decoration: none; border-radius: 30px; font-weight: 700; font-size: 0.85rem;" href="https://github.com/DurpyBongo" target="_blank">Explore GitHub →</a>
    </div>

    <!-- 4. WINDOW 2: FOREST TASK PLANNER APP (Hidden by default using display: none) -->
    <div id="plannerWindow" class="window" style="top: 55%; left: 65%; transform: translate(-50%, -50%); display: none;">
      <div id="plannerWindowHeader" class="windowheader">
        <button id="closePlannerBtn" class="closebutton"></button>
        <span style="font-family: 'Lora', serif; font-weight: 600; font-size: 0.9rem; color: #a3b899;">forest_tracker.sh</span>
        <span style="width: 14px;"></span>
      </div>

      <div class="task-container">
        <h2 style="font-family: 'Lora', serif; margin: 0 0 15px 0; font-size: 1.4rem; color: #e1ebd5; text-align: center;">Task Tracker</h2>
        
        <div class="task-form">
          <input type="text" id="taskInput" class="task-input" placeholder="What's your quest today?">
          <input type="datetime-local" id="taskDate" class="task-date">
          <button id="addTaskBtn" class="task-btn">Add Quest</button>
        </div>

        <ul id="taskList" class="task-list">
          <!-- Tasks automatically generate here -->
        </ul>
      </div>
    </div>

    <script defer src="script.js"></script>
  </body>
</html>
