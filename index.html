<!DOCTYPE html>
<html>
  <head>
    <title>ethanOS | Cozy Workspace</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Link to our CSS file -->
    <link rel="stylesheet" type="text/css" href="style.css">
  </head>
  
  <body style="
    background-image: linear-gradient(rgba(46, 74, 63, 0.15), rgba(46, 74, 63, 0.15)), url('https://images.unsplash.com/photo-1511497584788-876760111969?w=1200');
    background-size: cover;
    background-position: center;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    font-family: 'Quicksand', sans-serif;
    color: #f4f6f4;
  ">

    <!-- 1. THE COZY TOP BAR -->
    <div style="
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background-color: rgba(34, 49, 43, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 1000;
    ">
      <!-- Clickable OS name to reopen the window -->
      <span id="openBtn" style="font-family: 'Lora', serif; font-weight: 700; font-style: italic; color: #d4e3d4; font-size: 1.1rem; cursor: pointer; user-select: none;">ethanOS</span>
      <span style="font-size: 0.85rem; letter-spacing: 1px; color: #a3b899; font-weight: 600; user-select: none;">🍃 IN THE WOODS</span>
      <span id="timeElement" style="font-weight: 700; color: #f4f6f4; user-select: none;">Loading Time...</span>
    </div>

    <!-- 2. THE APPLICATION WINDOW -->
    <!-- Positioned dynamically using style so it floats perfectly in the center on startup -->
    <div id="welcomeWindow" class="window" style="top: 50%; left: 50%; transform: translate(-50%, -50%);">
      
      <!-- The Window Header (The Handle for Dragging) -->
      <div id="welcomeWindowHeader" class="windowheader">
        <button id="closeBtn" class="closebutton" title="Close Window"></button>
        <span style="font-family: 'Lora', serif; font-weight: 600; font-size: 0.9rem; color: #a3b899;">system_info.sh</span>
        <span style="width: 14px;"></span> <!-- Spacer to balance out close button -->
      </div>

      <!-- Bongo Cat Profile Picture -->
      <img style="
        width: 110px; 
        height: 110px; 
        border-radius: 50%; 
        object-fit: cover; 
        border: 3px solid #a3b899; 
        margin-bottom: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      " src="./BongoCat.jpg" alt="Bongo Cat" />

      <h1 style="font-family: 'Lora', serif; margin: 0 0 12px 0; font-size: 1.8rem; color: #e1ebd5; font-weight: 600;">
        @DurpyBongo
      </h1>
      
      <p style="font-size: 0.9rem; line-height: 1.6; color: #c9d3c4; margin-bottom: 25px; font-weight: 400;">
        Welcome to my quiet corner of the web. Grab the top bar of this window to drag me around your screen!
      </p>

      <a style="
        display: inline-block; 
        background-color: #a3b899; 
        color: #1e2d24; 
        padding: 10px 24px; 
        text-decoration: none; 
        border-radius: 30px; 
        font-weight: 700;
        font-size: 0.9rem;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(163, 184, 153, 0.2);
      " href="https://github.com/DurpyBongo" target="_blank">Explore GitHub →</a>
    </div>

    <!-- Link to our JavaScript logic file -->
    <script src="script.js"></script>
  </body>
</html>
