<!DOCTYPE html>
<html>
  <head>
    <title>My Personal OS</title>
  </head>
  
  <!-- This single body tag now contains your awesome dark-mode styles! -->
  <body style="background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding-top: 100px; padding-bottom: 50px;">

    <!-- 1. The Big Title -->
    <h1>ethanOS</h1>

    <!-- 2. A Subtitle -->
    <h2>System Status: Active</h2>

    <!-- 3. Your Profile / Vibe Image -->
    <!-- Added the circle & neon border styling here so it looks like a clean OS widget! -->
    <img style="width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid #38bdf8; margin: 20px 0;" 
         src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500" 
         alt="OS Profile Pic" />

    <!-- 4. A Short Intro Paragraph -->
    <p style="max-width: 600px; margin: 0 auto; line-height: 1.6; color: #cbd5e1;">
      Welcome to my personal operating system. Right now, it's a minimal layout built in VS Code, but we're transforming it into a full digital workspace.
    </p>

    <!-- 5. A Functional Launch Button -->
    <!-- Added the button styles so it looks like a real clickable interface button -->
    <a style="display: inline-block; background-color: #38bdf8; color: #0f172a; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 25px; box-shadow: 0 4px 14px rgba(56, 189, 248, 0.4);"
